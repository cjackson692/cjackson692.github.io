layout: default
title: Carter Smith
description: Computational Linguist & Quantitative Researcher

remote_theme: pages-themes/minimal@v0.2.0
 
plugins:
  - jekyll-remote-theme
 
# Hide the default "Download .zip / .tar.gz" buttons in the sidebar
show_downloads: false
 
# Markdown / kramdown settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
 
# Site-wide defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default
